name: shennong

services:
  shennong-os:
    image: ${SHENNONG_OS_IMAGE:-zerostwo/shennong-os:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SHENNONG_PORT:-18081}:8080"
    environment:
      SHENNONG_AUTO_INIT: "true"
      SHENNONG_CONFIG_DIR: /config
      SHENNONG_DATA_DIR: /data
      SHENNONG_PUBLIC_ORIGIN: ${SHENNONG_PUBLIC_ORIGIN:-http://localhost:18081}
      SHENNONG_IDE_PUBLIC_ORIGIN: ${SHENNONG_IDE_PUBLIC_ORIGIN:-http://ide.localhost:18081}
      SHENNONG_IDE_HOST: ${SHENNONG_IDE_HOST:-ide.localhost}
      SHENNONG_OS_COOKIE_SECURE: ${SHENNONG_OS_COOKIE_SECURE:-false}
      SHENNONG_DB_URL: http://shennong-db:8000
      SHENNONG_RUNTIME_URL: http://shennong-runtime:7000
    volumes:
      - ${SHENNONG_DATA_DIR:-./shennong-data}/config:/config
      - ${SHENNONG_DATA_DIR:-./shennong-data}/os:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - shennong-db
      - shennong-runtime

  shennong-db:
    image: ${SHENNONG_DB_IMAGE:-zerostwo/shennong-db:latest}
    restart: unless-stopped
    environment:
      SHENNONG_CONFIG_DIR: /config
      SHENNONG_DATA_DIR: /data
    volumes:
      - ${SHENNONG_DATA_DIR:-./shennong-data}/config:/config:ro
      - ${SHENNONG_DATA_DIR:-./shennong-data}/db:/data

  shennong-runtime:
    image: ${SHENNONG_RUNTIME_IMAGE:-zerostwo/shennong-runtime:latest}
    restart: unless-stopped
    environment:
      SHENNONG_CONFIG_DIR: /config
      SHENNONG_DATA_DIR: /data
      SHENNONG_DOCKER_SOCKET: /run/shennong/docker.sock
      SHENNONG_RUNTIME_IMAGE: ${SHENNONG_RUNTIME_IMAGE:-zerostwo/shennong-runtime:latest}
    volumes:
      - ${SHENNONG_DATA_DIR:-./shennong-data}/config:/config:ro
      - ${SHENNONG_DATA_DIR:-./shennong-data}/runtime:/data
      - ${SHENNONG_DOCKER_SOCKET:-/var/run/docker.sock}:/run/shennong/docker.sock


name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install pinned OpenAPI validator
        run: python3 -m pip install --disable-pip-version-check openapi-spec-validator==0.7.2
      - name: Validate OS API contract
        run: openapi-spec-validator openapi/os-api.yaml

  server:
    name: Rust server
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TEST_DATABASE_URL: postgres://shennong:shennong@127.0.0.1:5432/shennong_os_test
    services:
      postgres:
        image: postgres:17.10-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394
        env:
          POSTGRES_USER: shennong
          POSTGRES_PASSWORD: shennong
          POSTGRES_DB: shennong_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shennong -d shennong_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/server -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Run PostgreSQL integration test
        run: cargo test --locked --test postgres_integration -- --ignored

      - name: Run identity and Project RBAC matrix
        run: cargo test --locked --test identity_rbac_integration -- --ignored --test-threads=1

      - name: Audit dependencies
        # sqlx records optional MySQL RSA crates in Cargo.lock, but this service
        # enables PostgreSQL only and `cargo tree --target all -i rsa` has no enabled path.
        run: cargo install cargo-audit --locked && cargo audit --ignore RUSTSEC-2023-0071

  web:
    name: WebUI
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.17.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Check types
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build production bundle
        run: pnpm build

  agent-runtime:
    name: Agent Runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/agent-runtime
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.17.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: apps/agent-runtime/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: pnpm test

      - name: Check types
        run: pnpm typecheck

      - name: Validate built-in Skills
        run: pnpm skills:validate

      - name: Build production bundle
        run: pnpm build

  container-contracts:
    name: Container contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Check production Dockerfiles
        run: |
          docker buildx build --check --file Dockerfile .
          docker buildx build --check --file apps/server/Dockerfile .
          docker buildx build --check --file apps/web/Dockerfile apps/web
          docker buildx build --check --file apps/agent-runtime/Dockerfile apps/agent-runtime

      - name: Validate unified Compose expansion
        run: docker compose --env-file deploy/.env.example --file deploy/compose.yaml config --quiet

      - name: Validate embedded Caddy configuration
        run: >-
          docker run --rm
          --volume "$PWD/deploy/container/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.11.3-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: Parse deployment recovery scripts
        run: bash -n deploy/backup-unified.sh deploy/restore-unified.sh deploy/restore-drill.sh deploy/container/entrypoint.sh deploy/container/healthcheck.sh

      - name: Lint deployment recovery scripts
        run: shellcheck deploy/backup-unified.sh deploy/restore-unified.sh deploy/restore-drill.sh deploy/container/entrypoint.sh deploy/container/healthcheck.sh

      - name: Validate host service units
        run: systemd-analyze verify deploy/systemd/shennong-ollama-proxy.socket deploy/systemd/shennong-ollama-proxy.service

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

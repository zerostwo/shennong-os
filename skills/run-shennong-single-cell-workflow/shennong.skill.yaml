apiVersion: shennong.one/v1
kind: AgentSkill
metadata:
  id: zerostwo/run-shennong-single-cell-workflow
  name: run-shennong-single-cell-workflow
  version: 1.0.0
  revision: 2
  digest: sha256:7fa423acfa97a0ee4bfdda957be39e072bbeffdb34d5cf8a8810e5284944d622
  scope: platform
  publisher: zerostwo
  trust: built-in-reviewed
spec:
  entrypoint: SKILL.md
  description: Execute a reproducible Shennong single-cell workflow through governed project and Runtime tools.
  lifecycle: active
  compatibility:
    os: ">=1.0.0 <2.0.0"
    runtime: ">=1.0.0 <2.0.0"
    dbApi: v1
    pi: 0.80.10
  contract:
    inputs:
      - name: project-ref
        type: project-ref
        required: true
        description: Authorized Shennong OS project scope for all reads, writes, approvals, and Runtime jobs.
      - name: dataset-ref
        type: dataset-ref
        required: true
        description: Inspected single-cell or single-nucleus input with immutable provenance.
      - name: analysis-design
        type: analysis-design
        required: true
        description: Organism, assay, groups, contrasts, pairing, inferential unit, methods, and expected artifacts.
    outputs:
      - name: runtime-jobs
        type: runtime-job-list
        required: true
        description: Governed JobSpecs and terminal job records for every executed step.
      - name: artifact-bundle
        type: result-bundle
        required: true
        description: Registered tables, figures, objects, logs, and complete reproducibility metadata.
      - name: validation-report
        type: validation-report
        required: true
        description: Deterministic post-run validation that blocks completion on any failure.
  permissions:
    tools:
      - plan.propose
      - plan.update
      - db.inspect_resource
      - db.query_resource
      - db.get_provenance
      - project.list_files
      - project.read_file
      - project.write_file
      - environment.plan
      - runtime.submit_job
      - runtime.get_job
      - runtime.cancel_job
      - artifact.register
      - analysis.validate
    projectRead:
      - project://current/
    projectWrite:
      - project://current/scripts/
      - project://current/results/
      - project://current/reports/
      - project://current/logs/
      - project://current/environments/
      - project://current/.shennong/
    datasetAccess: private
    networkHosts: []
    computeProfiles:
      - cpu-small
    approvals:
      - runtime.compute
      - project.write
      - runtime.cancel
      - artifact.register
  validators:
    - analysis.validate

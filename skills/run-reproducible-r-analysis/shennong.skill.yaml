apiVersion: shennong.one/v1
kind: AgentSkill
metadata:
  id: zerostwo/run-reproducible-r-analysis
  name: run-reproducible-r-analysis
  version: 1.0.0
  revision: 1
  digest: sha256:35f603bb083f829b5350565537190e2b5ae8e181bbdba6c55c4fe4b0e71b088c
  scope: platform
  publisher: zerostwo
  trust: built-in-reviewed
spec:
  entrypoint: SKILL.md
  description: Execute bounded R analyses and ggplot2 visualizations through governed Project and Runtime tools.
  lifecycle: active
  compatibility:
    os: ">=1.0.0 <2.0.0"
    runtime: ">=1.0.0 <2.0.0"
    dbApi: v1
    pi: 0.80.10
  contract:
    inputs:
      - name: project-ref
        type: project-ref
        required: true
        description: Authorized Shennong OS Project for scripts, Runtime jobs, artifacts, and approvals.
      - name: analysis-request
        type: analysis-design
        required: true
        description: R computation or visualization request, inputs, expected outputs, and verification criteria.
    outputs:
      - name: runtime-job
        type: runtime-job
        required: true
        description: Terminal governed Runtime job with bounded logs and environment metadata.
      - name: artifact-bundle
        type: result-bundle
        required: true
        description: Registered scripts, figures, and tables with immutable provenance.
  permissions:
    tools:
      - plan.propose
      - plan.update
      - db.inspect_resource
      - db.query_resource
      - db.get_provenance
      - project.list_files
      - project.read_file
      - project.write_file
      - environment.plan
      - runtime.submit_job
      - runtime.get_job
      - runtime.cancel_job
      - artifact.register
      - analysis.validate
    projectRead:
      - project://current/
    projectWrite:
      - project://current/scripts/
      - project://current/results/
      - project://current/reports/
      - project://current/logs/
      - project://current/environments/
      - project://current/.shennong/
    datasetAccess: private
    networkHosts: []
    computeProfiles:
      - cpu-small
    approvals:
      - runtime.compute
      - project.write
      - runtime.cancel
      - artifact.register
  validators:
    - analysis.validate

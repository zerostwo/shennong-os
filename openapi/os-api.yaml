  /api/v1/runs/{id}/events/stream:
    get:
      tags: [Runs]
      operationId: streamRunEventReplay
      description: |
        Replays persisted AG-UI events strictly after the supplied cursor, then
        follows the same Run until a durable terminal event is emitted. `after`
        and `Last-Event-ID`, when both supplied, must be identical and must name
        an event owned by this Run. Events are emitted once in ascending cursor
        order; reconnecting never creates or restarts a Run.
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/AfterEventCursor'
        - $ref: '#/components/parameters/LastEventId'
        - $ref: '#/components/parameters/RunEventLimit'
      responses:
        '200':
          description: Durable AG-UI replay/follow stream; every frame has an SSE id cursor.
          content:
            text/event-stream:
              schema: { type: string }
        default: { $ref: '#/components/responses/Error' }

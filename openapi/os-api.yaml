  /api/v1/sessions/{id}/launch:
    post:
      tags: [IDE Access]
      operationId: createIdeLaunchTicket
      description: |
        Creates a 60-second, one-time launch URL on the separately configured
        IDE origin. Only the Runtime Session creator can launch it.
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: One-time launch URL and expiry; response is never cacheable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IdeLaunchEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /__shennong/launch:
    get:
      tags: [IDE Access]
      operationId: redeemIdeLaunchTicket
      description: |
        IDE-origin-only redemption. Atomically consumes the ticket, sets a
        host-only HttpOnly SameSite=Strict cookie scoped to this Session proxy,
        then redirects to the IDE. Ordinary OS APIs are rejected on this host.
      security: []
      parameters:
        - $ref: '#/components/parameters/IdeLaunchTicket'
      responses:
        '303':
          description: IDE access cookie issued and browser redirected.
          headers:
            Location:
              schema: { type: string, format: uri }
            Set-Cookie:
              schema: { type: string }
        default: { $ref: '#/components/responses/Error' }
  /v1/sessions/{id}/proxy:
    get:
      tags: [IDE Access]
      operationId: proxyIdeSessionGet
      description: |
        IDE-origin-only streaming HTTP or WebSocket proxy. OS control cookies
        and browser Authorization are stripped; OS sends Runtime only a fresh
        30-second JWT scoped to runtime:sessions:proxy and this workspace.
      security:
        - ideSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200': { description: Runtime IDE response or WebSocket upgrade. }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [IDE Access]
      operationId: proxyIdeSessionPost
      description: IDE-origin-only streaming form and API proxy.
      security:
        - ideSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/IdeOrigin'
      requestBody:
        required: false
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200': { description: Runtime IDE response. }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/resources:
    get:
      tags: [System]
      operationId: listDataPlaneResources
      security: []
      description: Anonymous catalog proxy that fails closed, returns at most 100 Resources whose permissions.visibility is exactly public, and emits a short public cache policy. Malformed or missing visibility never grants access.
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, maxLength: 256 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, maximum: 1000000, default: 0 }
        - name: cursor
          in: query
          required: false
          description: Decimal offset cursor. If offset is also present, both values must match.
          schema: { type: string, pattern: '^[0-9]+$' }
      responses:
        '200':
          description: Bounded public Shennong DB Resource discovery result. Cache-Control is public, max-age=30, stale-while-revalidate=60.
          content:
            application/json:
              schema: {}
        default: { $ref: '#/components/responses/Error' }
  /api/v1/resource-providers:
    get:
      tags: [Administration]
      operationId: listResourceProviders
      description: Lists ShennongDB Resource provider manifests for a Shennong OS administrator without exposing the internal service credential.
      responses:
        '200':
          description: Installable Resource provider manifests.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/resources/install:
    post:
      tags: [Administration]
      operationId: installResourceProvider
      description: Installs one governed ShennongDB Resource provider. The completed upstream response is returned only after atomic publication.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 128, pattern: '^[A-Za-z0-9_-]+$' }
      responses:
        '200': { description: Installed and published Resource. }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/resources/{id}:
    get:
      tags: [System]
      operationId: getDataPlaneResource
      security: []
      description: Anonymous lookup for an explicitly public Resource. Private or unlabelled Resources are returned as 404.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, maxLength: 180 }
      responses:
        '200': { description: Explicitly public Resource contract from Shennong DB. }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/resources/{id}/{child}:
    get:
      tags: [System]
      operationId: getDataPlaneResourceChild
      security: []
      description: Anonymous child lookup guarded by an exact public Resource preflight. Private or unlabelled parent Resources are returned as 404; private relation targets and project-scoped graph contexts are removed.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, maxLength: 180 }
        - name: child
          in: path
          required: true
          schema: { type: string, enum: [artifacts, relations, graph-context] }
      responses:
        '200': { description: 'Bounded, public-only Resource child collection from Shennong DB.' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/query:
    post:
      tags: [System]
      operationId: queryDataPlaneResource
      description: Authenticated Project-scoped Resource query. project_id and resource are mandatory, the actor needs Project read access, and the Resource must be explicitly bound to that Project.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, resource]
              properties:
                project_id: { type: string, format: uuid }
                resource:
                  type: string
                  minLength: 1
                  maxLength: 180
                  pattern: '^[A-Za-z0-9._:-]+$'
              additionalProperties: true
      responses:
        '200': { description: Bounded query result from Shennong DB. }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/projects/{id}/{collection}:
    get:
      tags: [Projects]
      operationId: getProjectDataPlaneCollection
      description: Project-RBAC proxy that first reconciles the OS-authoritative DB shadow, then reads context-pack, entities, activities, studies, associations, evidence or resources.
      parameters:
        - $ref: '#/components/parameters/Id'

            application/json:
              schema: { $ref: '#/components/schemas/ListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Skills]
      operationId: createSkill
      description: User and generated Skills always begin as drafts. Signed built-ins are installed only by trusted platform migrations.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillCreate' }
      responses:
        '201':
          description: Skill and immutable first version created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/skills/{id}:
    get:
      tags: [Skills]
      operationId: getSkill
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Skill and current immutable version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Skills]
      operationId: updateSkill
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillUpdate' }
      responses:
        '200':
          description: Mutable skill metadata updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/skills/{id}/versions:
    get:
      tags: [Skills]
      operationId: listSkillVersions
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Immutable skill versions and digests.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Skills]
      operationId: createSkillVersion
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillVersionCreate' }
      responses:
        '201':
          description: Immutable skill version created with a SHA-256 digest.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/threads/{id}/skills/{skill_id}:
    put:
      tags: [Skills]
      operationId: enableThreadSkill
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillEnable' }
      responses:
        '200':
          description: Exact skill version pinned to the thread.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Skills]
      operationId: disableThreadSkill
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/SkillId'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204': { description: Skill disabled for the thread. }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/threads/{id}/skills:
    get:
      tags: [Skills]
      operationId: listThreadSkills
      description: Lists every Skill visible to the actor with its selection state for this thread.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Visible Skills with enabled and selected_version fields.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/providers:
    get:
      tags: [Providers]
      operationId: listProviders
      responses:
        '200':
          description: Provider configurations without credential material.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Providers]
      operationId: createProvider
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProviderCreate' }
      responses:
        '201':
          description: Provider created; API key encrypted at rest.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/providers/{id}:
    patch:
      tags: [Providers]
      operationId: updateProvider
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProviderUpdate' }
      responses:
        '200':
          description: Provider updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Providers]
      operationId: deleteProvider
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204': { description: Provider deleted. }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/system/dependencies:
    get:
      tags: [Administration]
      operationId: getDependencyHealth
      responses:
        '200':
          description: Typed Shennong DB and runtime info probes.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/audit-events:
    get:
      tags: [Administration]
      operationId: listAuditEvents
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Newest audit events first.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: shennong_os_session
      description: Random opaque session token. Stored server-side only as a SHA-256 hash.
    bearerSession:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
    serviceToken:
      type: http
      scheme: bearer
      bearerFormat: opaque-service-token
      description: Agent Runtime callback token loaded by both services from secret files.
    ideSessionCookie:
      type: apiKey
      in: cookie
      name: shennong_ide_session
      description: |
        Opaque, server-hashed access token. It is host-only, HttpOnly,
        SameSite=Strict and path-scoped to exactly one Runtime Session proxy.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SkillId:
      name: skill_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Origin:
      name: Origin
      in: header
      required: true
      description: Must exactly match a configured allowed origin.
      schema: { type: string, format: uri }
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required for cookie-authenticated mutations; must match the shennong_os_csrf cookie.
      schema: { type: string, minLength: 32 }
    BootstrapToken:
      name: X-Shennong-Bootstrap-Token
      in: header
      required: true
      schema: { type: string, minLength: 32 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique within one thread. Use the same key when retrying message persistence.
      schema: { type: string, minLength: 8, maxLength: 200 }
    AgentRuntimeService:
      name: X-Shennong-Service
      in: header
      required: true
      schema: { type: string, const: agent-runtime }
    ProjectHeader:
      name: X-Shennong-Project-Id
      in: header
      required: true
      description: Explicit project scope for this Agent Run; never inferred from UI state.
      schema: { type: string, format: uuid }
    IdeLaunchTicket:
      name: ticket
      in: query
      required: true
      description: 60-second one-time launch ticket returned by the OS origin.
      schema: { type: string, minLength: 32, maxLength: 256 }
    IdeOrigin:
      name: Origin
      in: header
      required: true
      description: Must exactly equal SHENNONG_IDE_PUBLIC_ORIGIN.
      schema: { type: string, format: uri }
    ProjectDataCollection:
      name: collection
      in: path
      required: true
      schema:
        type: string
        enum: [context-pack, entities, activities, studies, associations, evidence, resources]
    ProjectIdRequired:
      name: project_id
      in: query
      required: true
      schema: { type: string, format: uuid }
    ProjectIdOptional:
      name: project_id
      in: query
      required: false
      description: Omit for actor-private, non-project memory.
      schema: { type: string, format: uuid }
    ThreadScopeOptional:
      name: scope
      in: query
      required: false
      description: Use personal to list only actor-owned chats or runs without a Project.
      schema: { type: string, enum: [personal] }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 500 }
    AfterEventCursor:
      name: after
      in: query
      required: false
      description: Return or stream only events strictly after this Run-owned cursor; zero starts at the beginning.
      schema: { type: string, pattern: '^(0|[1-9][0-9]*)$', default: '0' }
    LastEventId:
      name: Last-Event-ID
      in: header
      required: false
      description: SSE reconnect cursor. When `after` is also present, both values must be identical.
      schema: { type: string, pattern: '^(0|[1-9][0-9]*)$' }
    RunEventLimit:
      name: limit
      in: query
      required: false
      description: Maximum events per ordered database batch.
      schema: { type: integer, minimum: 1, maximum: 1000, default: 500 }
  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    AgUiRunAgentInput:
      type: object
      required: [threadId, runId, messages]
      properties:
        threadId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        parentRunId: { type: [string, 'null'], format: uuid }
        messages:
          type: array
          minItems: 1
          maxItems: 200
          items: { type: object, additionalProperties: true }
        state: {}
        tools:
          description: Ignored; only server-registered tools are authoritative.
        context:
          description: Ignored; durable OS context is authoritative.
        forwardedProps:
          description: Ignored.
        resume:
          type: array
          minItems: 1
          maxItems: 1
          items: { $ref: '#/components/schemas/AgUiResumeEntry' }
    AgUiResumeEntry:
      oneOf:
        - type: object
          additionalProperties: false
          required: [interruptId, status, payload]
          properties:
            interruptId: { type: string, format: uuid }
            status: { type: string, const: resolved }
            payload:
              type: object
              additionalProperties: false
              required: [approved]
              properties:
                approved: { type: boolean, const: true }
        - type: object
          additionalProperties: false
          required: [interruptId, status]
          properties:
            interruptId: { type: string, format: uuid }
            status: { type: string, const: cancelled }
    InternalRunIdentity:
      type: object
      required: [thread_id, run_id]
      properties:
        thread_id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        parent_run_id: { type: [string, 'null'], format: uuid }
    InternalRunFinish:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [succeeded, failed, failed_validation, cancelled] }
        result: { type: [object, 'null'], additionalProperties: true }
        error: { type: [object, 'null'], additionalProperties: true }
    CapabilityRequest:
      type: object
      required: [runId, userId, projectId, toolCallId, toolName, argumentsDigest, risk, runCapabilityToken, arguments]
      properties:
        runId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        toolCallId: { type: string, minLength: 1, maxLength: 256 }
        toolName: { type: string, minLength: 1, maxLength: 128 }
        argumentsDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        risk: { type: string, enum: [read, write, network, compute, destructive, admin] }
        runCapabilityToken: { type: string, minLength: 32 }
        arguments: { type: object, additionalProperties: true }
    ToolExecutionRequest:
      allOf:
        - $ref: '#/components/schemas/CapabilityRequest'
        - type: object
          required: [arguments, executionToken]
          properties:
            arguments: { type: object, additionalProperties: true }
            executionToken: { type: string, minLength: 32 }
    RuntimeSessionCreate:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [rstudio, jupyterlab] }
        worker_profile: { type: [string, 'null'], enum: [interactive-standard, ide-small, null] }
        idle_timeout_seconds: { type: [integer, 'null'], minimum: 300, maximum: 28800 }
        max_lifetime_seconds: { type: [integer, 'null'], minimum: 300, maximum: 28800 }
    IdeLaunchEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [launch_url, expires_at]
          properties:
            launch_url: { type: string, format: uri }
            expires_at: { type: string, format: date-time }
    Health:
      type: object
      required: [status, version, database]
      properties:
        status: { type: string, enum: [ok, unavailable] }
        version: { type: string }
        database: { type: string, enum: [ready, unavailable] }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
    ObjectEnvelope:
      type: object
      required: [data]
      properties:
        data: { type: object, additionalProperties: true }
    ListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { type: object, additionalProperties: true }
    SetupStatusEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [needs_setup]
          properties:
            needs_setup: { type: boolean }
    RegistrationPolicyEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [registration_mode, invite_required]
          properties:
            registration_mode: { $ref: '#/components/schemas/RegistrationMode' }
            invite_required: { type: boolean }
    RegistrationMode:
      type: string
      enum: [disabled, invite_only, open]
    RegistrationPolicyWrite:
      type: object
      required: [registration_mode]
      properties:
        registration_mode: { $ref: '#/components/schemas/RegistrationMode' }
    AccountRequest:
      type: object
      required: [display_name, email, password]
      properties:
        display_name: { type: string, minLength: 1, maxLength: 120 }
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 12, maxLength: 1024 }
        invite_code:
          type: [string, 'null']
          description: Required only when registration_mode is invite_only; ignored for bootstrap.
    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    ProfileWrite:
      type: object
      required: [display_name, username]
      properties:
        display_name: { type: string, minLength: 1, maxLength: 128 }
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9][a-z0-9._-]{2,31}$'
        avatar_url:
          type: [string, 'null']
          maxLength: 700000
          description: HTTPS URL or a PNG, JPEG, or WebP data URL.
    AdminUserUpdate:
      type: object
      properties:
        display_name: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        email: { type: [string, 'null'], format: email, maxLength: 320 }
        role: { type: [string, 'null'], enum: [admin, user, null] }
        status: { type: [string, 'null'], enum: [active, disabled, null] }
    SessionEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, email, display_name, username, role]
          properties:
            id: { type: string, format: uuid }
            email: { type: string, format: email }
            display_name: { type: string }
            username: { type: string }
            avatar_url: { type: [string, 'null'] }
            role: { type: string, enum: [admin, user] }
            csrf_token:
              type: string
              description: Present when a new session is issued.
    CurrentSessionEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [authenticated]
          properties:
            authenticated: { type: boolean }
            user:
              type: object
              required: [id, email, display_name, username, role]
              properties:
                id: { type: string, format: uuid }
                email: { type: string, format: email }
                display_name: { type: string }
                username: { type: string }
                avatar_url: { type: [string, 'null'] }
                role: { type: string, enum: [admin, user] }
    InviteCreate:
      type: object
      properties:
        email_constraint: { type: [string, 'null'], format: email }
        max_uses: { type: [integer, 'null'], minimum: 1, maximum: 10000, default: 1 }
        expires_in_seconds: { type: [integer, 'null'], minimum: 60 }
        note: { type: [string, 'null'], maxLength: 1000 }
    ProjectCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 10000, default: '' }
        visibility: { type: [string, 'null'], enum: [private, null], default: private }
    ProjectUpdate:
      type: object
      properties:
        name: { type: [string, 'null'], minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 10000 }
        visibility: { type: [string, 'null'], enum: [private, null] }
        status: { type: [string, 'null'], enum: [regular, active, archived, null] }
    MemberWrite:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [owner, admin, editor, viewer] }
    ThreadCreate:
      type: object
      properties:
        project_id: { type: [string, 'null'], format: uuid }
        title: { type: [string, 'null'], maxLength: 500 }
        provider_id: { type: [string, 'null'], format: uuid }
        scope:
          type: [string, 'null']
          enum: [personal, project, null]
          description: Defaults to project when project_id is present, otherwise personal.
    ThreadUpdate:
      type: object
      properties:
        title: { type: [string, 'null'], maxLength: 500 }
        status: { type: [string, 'null'], enum: [active, archived, null] }
        provider_id: { type: [string, 'null'], format: uuid }
    Thread:
      type: object
      required: [id, project_id, scope, owner_user_id, title, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: [string, 'null'], format: uuid }
        scope: { type: string, enum: [personal, project] }
        owner_user_id: { type: string, format: uuid }
        provider_id: { type: [string, 'null'], format: uuid }
        title: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MessageCreate:
      type: object
      required: [content_json]
      properties:
        role:
          type: [string, 'null']
          enum: [user, assistant, system, tool, null]
          description: Ordinary users may create user-role messages only.
        content_json: {}
        status: { type: [string, 'null'], enum: [pending, completed, failed, cancelled, null] }
        attachments: { default: [] }
        metadata: { default: {} }
    Message:
      type: object
      required: [id, thread_id, role, content_json, status, attachments, metadata, created_at]
      properties:
        id: { type: string, format: uuid }
        thread_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system, tool] }
        content_json: {}
        status: { type: string }
        attachments: {}
        metadata: {}
        created_at: { type: string, format: date-time }
    RunCreate:
      type: object
      properties:
        input: { default: {} }
    RunUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        output: { default: {} }
        error: { default: {} }
    RunEventCreate:
      type: object
      required: [event_type]
      properties:
        event_type: { type: string, minLength: 1, maxLength: 120 }
        payload: { default: {} }
    PlanWrite:
      type: object
      required: [items]
      properties:
        items: {}
    JobCreate:
      type: object
      required: [kind]
      properties:
        kind: { type: string, minLength: 1, maxLength: 120 }
        run_id: { type: [string, 'null'], format: uuid }
        spec: { default: {} }
    JobUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        result: { default: {} }
    ArtifactCreate:
      type: object
      required: [kind, name, locator]
      properties:
        job_id: { type: [string, 'null'], format: uuid }
        kind: { type: string }
        name: { type: string }
        locator: { type: string }
        media_type: { type: [string, 'null'] }
        size_bytes: { type: [integer, 'null'], minimum: 0 }
        content_sha256: { type: [string, 'null'], pattern: '^[a-fA-F0-9]{64}$' }
        metadata: { default: {} }
    MemoryCreate:
      type: object
      required: [title, content]
      properties:
        project_id: { type: [string, 'null'], format: uuid }
        title: { type: string, minLength: 1, maxLength: 500 }
        content: { type: string }
        source_kind: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
    MemoryUpdate:
      type: object
      properties:
        title: { type: [string, 'null'] }
        content: { type: [string, 'null'] }
        lifecycle: { type: [string, 'null'], enum: [active, archived, null] }
        change_note: { type: [string, 'null'] }
    SkillCreate:
      type: object
      required: [name, content]
      properties:
        name: { type: string }
        description: { type: [string, 'null'] }
        slug: { type: [string, 'null'] }
        trust_level:
          type: [string, 'null']
          enum: [admin_curated, user, generated, null]
        lifecycle: { type: [string, 'null'], enum: [draft, active, disabled, archived, null] }
        manifest: { type: object, additionalProperties: true, default: {} }
        content: { type: string }
        package_version: { type: [string, 'null'] }
        change_note: { type: [string, 'null'] }
    SkillUpdate:
      type: object
      properties:
        name: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        lifecycle: { type: [string, 'null'], enum: [draft, active, disabled, archived, null] }
        manifest: { type: [object, 'null'], additionalProperties: true }
    SkillVersionCreate:
      type: object
      required: [content]
      properties:
        content: { type: string }
        package_version: { type: [string, 'null'] }
